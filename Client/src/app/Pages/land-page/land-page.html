<!-- Health bar -->
<div class="health-bar">
  <span class="cross">✛</span>
  <div class="bar-track"><span class="bar-fill"></span></div>
  <div class="bar-dots">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
</div>

<!-- Menu -->
<nav class="menu">
<nav class="menu">
  <button class="menu-item" type="button" (mouseenter)="setActive(0)" [class.active]="activeIndex === 0" (click)="setActive(0); joinRoom()">
    <span class="arrow">&#9658;</span><span class="label">JOIN ROOM</span>
  </button>
  <button class="menu-item" type="button" (mouseenter)="setActive(1)" [class.active]="activeIndex === 1" (click)="setActive(1); createRoom()">
    <span class="arrow">&#9658;</span><span class="label">CREATE ROOM</span>
  </button>
  <button class="menu-item" type="button" (mouseenter)="setActive(2)" [class.active]="activeIndex === 2" (click)="setActive(2); findRoom()">
    <span class="arrow">&#9658;</span><span class="label">FIND ROOM</span>
  </button>
</nav>
</nav>
